# Sample workflow for building and deploying holiday data to GitHub Pages
name: Deploy holidays.json

on:
  schedule:
    - cron: '30 0 * 6-12 *'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      target:
        description: 'Target region to update'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'cn'
          - 'hk'
          - 'tw'

env:
  REPO_OWNER: ${{ github.repository_owner }}
  REPO_NAME: ${{ github.event.repository.name }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      has_update: ${{ steps.update_check.outputs.has_update }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: npm install axios cheerio iconv-lite

      - name: Download existing data from GitHub Pages
        run: |
          mkdir -p data
          FILES=("holidays_cn.json" "holidays_hk.json" "holidays_tw.json")
          for FILE in "${FILES[@]}"; do
            URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/data/${FILE}"
            HTTP_CODE=$(curl -s -w "%{http_code}" -o "data/${FILE}" "${URL}" || echo "000")
            if [ "${HTTP_CODE}" = "200" ]; then
              echo "下载成功: ${FILE}"
            else
              echo "下载失败 (HTTP ${HTTP_CODE}): ${FILE}，删除空文件"
              rm -f "data/${FILE}"
            fi
          done
          echo "现有数据文件:"
          ls -la data/
          for FILE in holidays_cn.json holidays_hk.json holidays_tw.json; do
            if [ -f "data/${FILE}" ]; then
              stat -c %Y "data/${FILE}" > "data/${FILE}.ts"
            fi
          done

      - name: Determine target region
        id: determine_region
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ inputs.target }}"
          else
            MONTH=$(date -u +%-m)
            case "$MONTH" in
              6|7|8|9) TARGET="tw" ;;
              10|11|12) TARGET="all" ;;
              *) TARGET="" ;;
            esac
          fi

          echo "target=$TARGET" >> $GITHUB_OUTPUT

      - name: Run check_holidays_cn.js (CN)
        if: steps.determine_region.outputs.target == 'cn' || steps.determine_region.outputs.target == 'all'
        run: node scripts/check_holidays_cn.js

      - name: Run check_holidays_hk.js (HK)
        if: steps.determine_region.outputs.target == 'hk' || steps.determine_region.outputs.target == 'all'
        run: node scripts/check_holidays_hk.js

      - name: Run check_holidays_tw.js (TW)
        if: steps.determine_region.outputs.target == 'tw' || steps.determine_region.outputs.target == 'all'
        run: node scripts/check_holidays_tw.js

      - name: Check if update needed
        id: update_check
        run: |
          HAS_UPDATE=false
          for FILE in holidays_cn.json holidays_hk.json holidays_tw.json; do
            if [ ! -f "data/${FILE}" ]; then
              continue
            fi
            if [ ! -f "data/${FILE}.ts" ]; then
              HAS_UPDATE=true
              echo "${FILE}: 新文件，需要部署。"
              break
            fi
            NEW_TS=$(stat -c %Y "data/${FILE}")
            OLD_TS=$(cat "data/${FILE}.ts")
            if [ "${NEW_TS}" != "${OLD_TS}" ]; then
              HAS_UPDATE=true
              echo "${FILE}: 内容有变化，需要部署。"
              break
            fi
          done
          echo "has_update=${HAS_UPDATE}" >> $GITHUB_OUTPUT
          if [ "${HAS_UPDATE}" = "true" ]; then
            echo "发现更新文件，准备部署。"
          else
            echo "无更新文件，跳过部署。"
          fi

      - name: Setup Pages
        if: steps.update_check.outputs.has_update == 'true'
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        if: steps.update_check.outputs.has_update == 'true'
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        if: steps.update_check.outputs.has_update == 'true'
        uses: actions/upload-pages-artifact@v4

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        if: needs.build.outputs.has_update == 'true'
        uses: actions/deploy-pages@v5
