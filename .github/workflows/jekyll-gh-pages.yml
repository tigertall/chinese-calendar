# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy holidays.json

on:
  schedule:
    - cron: '0 0 * 10-12 *' 

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  REPO_OWNER: ${{ github.repository_owner }} # 自动获取当前仓库所有者
  REPO_NAME: ${{ github.event.repository.name }} # 自动获取当前仓库名

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    outputs:
      # 关键：把输出变量暴露给其他 Job
      has_update: ${{ steps.update_check.outputs.has_update }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      - name: Run script
        run: python scripts/check_holidays.py
      - name: Check if update needed
        id: update_check
        run: |
          if [ -f "holidays.json" ]; then
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "发现更新文件，准备部署。"
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
            echo "无更新文件，跳过部署。"
          fi
      - name: Setup Pages
        if: steps.update_check.outputs.has_update == 'true'
        uses: actions/configure-pages@v6
      - name: Build with Jekyll
        if: steps.update_check.outputs.has_update == 'true'
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        if: steps.update_check.outputs.has_update == 'true'
        uses: actions/upload-pages-artifact@v4

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        if: steps.update_check.outputs.has_update == 'true'
        id: deployment
        uses: actions/deploy-pages@v5
